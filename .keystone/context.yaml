sources:
  docs:
    type: markdown
    root: .keystone/context/

  # The harness adapter is always rooted at .keystone/harness. Any `root`
  # declared here is ignored. Uncomment once you've run harness_bootstrap.
  # hb:
  #   type: harness

  # Uncomment when GITHUB_TOKEN is set in the environment.
  # gh:
  #   type: github
  #   repo: tacoda/keystone-mcp
  #   auth: env:GITHUB_TOKEN

  # Uncomment when Confluence credentials are set in the environment.
  # wiki:
  #   type: confluence
  #   base_url: https://acme.atlassian.net
  #   email: env:CONFLUENCE_EMAIL
  #   auth: env:CONFLUENCE_API_TOKEN

  # Uncomment when a Notion integration token is set in the environment.
  # notion:
  #   type: notion
  #   auth: env:NOTION_TOKEN

  # Uncomment when Jira Cloud credentials are set in the environment.
  # tickets:
  #   type: jira
  #   base_url: https://acme.atlassian.net
  #   email: env:JIRA_EMAIL
  #   auth: env:JIRA_API_TOKEN

  # Uncomment when a Linear personal API key is set in the environment.
  # linear:
  #   type: linear
  #   auth: env:LINEAR_API_KEY

  # Uncomment when a Slack OAuth token is set in the environment.
  # slack:
  #   type: slack
  #   auth: env:SLACK_BOT_TOKEN

topics:
  deploy-policy:
    description: |
      Rules and context for production deploys. Read before any change touching
      deploy scripts, CI config, or release tooling.
    sources:
      - source: docs
        query: { file: deploy-policy.md }
        classify:
          rules: { heading: "Rules", severity: must }
          reasoning: { heading: "Background" }
    cache: 15m

  module-ownership:
    description: |
      Who owns each module and how to reach them. Read when choosing reviewers
      or asking design questions.
    sources:
      - source: docs
        query: { file: owners.md }
        classify:
          rules: { heading: "Required reviewers" }
          reasoning: { heading: "Contacts" }
    tags: [people]

  coding-standards:
    description: |
      House coding standards. Read when adding new modules or refactoring.
    sources:
      - source: docs
        query: { file: coding-standards.md }
        classify:
          rules: { heading: "Standards", severity: should }
          reasoning: { heading: "Rationale" }

  release-playbook:
    description: |
      Procedures and canned commands for cutting a release. Read before tagging
      or publishing.
    sources:
      - source: docs
        query: { file: release-playbook.md }
        classify:
          rules:    { heading: "Rules" }
          skills:   { heading: "Procedures" }
          commands: { heading: "Commands" }

  # Example multi-source topic combining local docs with live GitHub state.
  # Enable once the `gh` source is uncommented above.
  # repo-policy:
